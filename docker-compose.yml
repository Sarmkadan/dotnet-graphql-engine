version: '3.8'

services:
  graphql-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dotnet-graphql-engine
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - GraphQL__MaxQueryComplexity=5000
      - GraphQL__MaxQueryDepth=15
      - GraphQL__MaxQueryFields=200
      - GraphQL__EnableCaching=true
      - GraphQL__CacheTtlSeconds=300
      - GraphQL__CacheMaxSizeBytes=104857600
      - GraphQL__EnableSubscriptions=true
      - GraphQL__EnableSchemaStitching=false
      - GraphQL__QueryTimeoutMs=30000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - graphql-network

  # Redis for distributed caching and pub/sub (subscriptions)
  redis:
    image: redis:7-alpine
    container_name: graphql-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - graphql-network
    volumes:
      - redis-data:/data

  # PostgreSQL for data persistence
  postgres:
    image: postgres:16-alpine
    container_name: graphql-postgres
    environment:
      POSTGRES_DB: graphql_db
      POSTGRES_USER: graphql
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphql"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - graphql-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

networks:
  graphql-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:

# Usage:
# docker compose up -d                    # Start all services
# docker compose up graphql-engine        # Start engine only
# docker compose down                     # Stop all services
# docker compose logs -f graphql-engine   # Follow engine logs
# docker compose ps                       # Show running containers
