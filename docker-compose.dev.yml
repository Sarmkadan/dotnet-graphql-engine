version: '3'
services:
  app:
    build: .
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      - redis
    healthcheck:
      test: ["curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5